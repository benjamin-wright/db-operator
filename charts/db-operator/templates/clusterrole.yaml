apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "db-operator.fullname" . }}-manager
  labels:
    {{- include "db-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - db-operator.benjamin-wright.github.com
    resources:
      - postgresdatabases
      - postgrescredentials
      - redisdatabases
      - rediscredentials
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - db-operator.benjamin-wright.github.com
    resources:
      - postgresdatabases/status
      - postgrescredentials/status
      - redisdatabases/status
      - rediscredentials/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - db-operator.benjamin-wright.github.com
    resources:
      - postgresdatabases/finalizers
      - postgrescredentials/finalizers
      - redisdatabases/finalizers
      - rediscredentials/finalizers
    verbs:
      - update
  # StatefulSets and Services (owned by PostgresDatabase and RedisDatabase resources)
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Secrets (for PostgresCredential and RedisCredential management)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Events (read-only; controller-runtime emits events via the recorder)
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - patch
