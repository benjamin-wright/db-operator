apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "db-operator.fullname" . }}-manager
  labels:
    {{- include "db-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - db-operator.benjamin-wright.github.com
    resources:
      - postgresdatabases
      - postgrescredentials
      - redisdatabases
      - rediscredentials
      - natsclusters
      - natsaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - db-operator.benjamin-wright.github.com
    resources:
      - postgresdatabases/status
      - postgrescredentials/status
      - redisdatabases/status
      - rediscredentials/status
      - natsclusters/status
      - natsaccounts/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - db-operator.benjamin-wright.github.com
    resources:
      - postgresdatabases/finalizers
      - postgrescredentials/finalizers
      - redisdatabases/finalizers
      - rediscredentials/finalizers
      - natsclusters/finalizers
      - natsaccounts/finalizers
    verbs:
      - update
  # StatefulSets (owned by PostgresDatabase and RedisDatabase) and Deployments (owned by NatsCluster)
  - apiGroups:
      - apps
    resources:
      - statefulsets
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # ConfigMaps (owned by NatsCluster for server configuration)
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # PersistentVolumeClaims (owned by NatsCluster for JetStream storage)
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Secrets (for PostgresCredential, RedisCredential, and NatsAccount user management)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Events (read-only; controller-runtime emits events via the recorder)
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - patch
